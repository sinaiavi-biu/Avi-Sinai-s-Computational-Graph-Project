<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Avi Sinai's Computational Graph Project</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef3f7;
            --panel: #ffffff;
            --line: #cfd6e3;
            --text: #172033;
            --muted: #68758a;
            --accent: #0f766e;
            --warm: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                linear-gradient(135deg, rgba(15, 118, 110, 0.10), rgba(37, 99, 235, 0.06) 42%, rgba(245, 158, 11, 0.12)),
                linear-gradient(90deg, rgba(23, 32, 51, 0.05) 1px, transparent 1px),
                linear-gradient(0deg, rgba(23, 32, 51, 0.05) 1px, transparent 1px),
                var(--bg);
            background-size: auto, 44px 44px, 44px 44px, auto;
            color: var(--text);
        }

        .app {
            height: 100vh;
            display: grid;
            grid-template-rows: 76px 1fr;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 0 24px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 10px 28px rgba(23, 32, 51, 0.10);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
        }

        .status {
            border: 1px solid rgba(15, 118, 110, 0.26);
            background: #eef7f6;
            color: #0b5f59;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(260px, 320px) minmax(520px, 1fr) minmax(310px, 380px);
            gap: 12px;
            min-height: 0;
            padding: 14px;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 16px 30px rgba(23, 32, 51, 0.12);
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="brand">
                <h1>Avi Sinai's Computational Graph Project</h1>
                <div class="subtitle">Runtime graph deployment, topic messaging, and agent visualization</div>
            </div>
            <div class="status">localhost:8080</div>
        </header>
        <div class="layout">
            <iframe name="left" src="/app/form.html" title="Forms"></iframe>
            <iframe name="center" src="/app/temp.html" title="Graph"></iframe>
            <iframe name="right" src="/publish" title="Topic values"></iframe>
        </div>
    </div>
</body>
</html>
