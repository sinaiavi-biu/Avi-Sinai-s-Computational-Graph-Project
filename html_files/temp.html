<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Avi Sinai's Graph Project</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #172033;
            background:
                linear-gradient(135deg, rgba(239, 246, 255, 0.95), rgba(238, 247, 246, 0.86) 50%, rgba(255, 247, 237, 0.90)),
                linear-gradient(90deg, rgba(23, 32, 51, 0.04) 1px, transparent 1px),
                linear-gradient(0deg, rgba(23, 32, 51, 0.04) 1px, transparent 1px);
            background-size: auto, 40px 40px, 40px 40px;
            display: grid;
            place-items: center;
        }

        .empty {
            text-align: center;
            max-width: 420px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            letter-spacing: 0;
        }

        p {
            margin: 0;
            color: #68758a;
            font-size: 15px;
            line-height: 1.45;
        }
    </style>
</head>
<body>
    <div class="empty">
        <h1>Avi Sinai's Graph Project</h1>
        <p>Deploy a config from the left panel to bring the runtime graph online.</p>
    </div>
</body>
</html>
